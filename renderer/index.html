<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schmoozzer automation</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <h1>Schmoozzer</h1>
    <p class="subtitle">LinkedIn automation dashboard</p>
  </header>

  <main class="main">
    <section class="controls">
      <button type="button" id="btn-start" class="btn btn-primary">Start</button>
      <button type="button" id="btn-stop" class="btn btn-secondary" disabled>Stop</button>
    </section>

    <section class="status-panel">
      <h2>Status</h2>
      <dl class="status-grid">
        <dt>State</dt>
        <dd id="status-state">—</dd>
        <dt>Running</dt>
        <dd id="status-running">—</dd>
        <dt>Dry run</dt>
        <dd id="status-dry-run">—</dd>
        <dt>Comments today</dt>
        <dd id="status-comments-today">—</dd>
        <dt>Session</dt>
        <dd id="status-session">—</dd>
      </dl>
    </section>

    <section class="log-panel">
      <h2>Log</h2>
      <pre id="activity-log" class="activity-log"></pre>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>

</html>
